<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Pesquisa Culturama</title>
</head>
<body>
    <header>
        <h1>Pesquisa Online</h1>
    </header>

    <section>
        <form action="#" method="get">
            <fieldset>
                <legend>Dados Pessoais</legend>
                    <label for="name">Nome</label>
                    <input type="text" name="name" id="name" required>
                    <br>
                    <label for="age">Idade</label>
                    <input type="number" name="age" id="age" min="12" max="100" required>
                    <br>
                    <label for="birthdate">Data de Nascimento</label>
                    <input type="date" name="birthdate" id="birthdate">
                    <br>
                    <label for="email">Email</label>
                    <input type="email" name="email" id="email" required>
                    <br>
                    <label for="tel">Telefone</label>
                    <input type="tel" name="usertel" id="tel" pattern="[0-9] {11}" placeholder="(xx)xxxxx-xxxx">
                    <br>
                    <label for="image">Upload de Foto</label>
                    <input type="file" accept="image/*" name="image" id="image"> 
            </fieldset>

            <fieldset>
                <legend>Perfil</legend>
                    <input type="radio" name="fem" value="Feminino" id="fem">
                    <label for="fem">Feminino</label>

                    <input type="radio" name="masc" value="Masculino" id="masc">
                    <label for="masc">Masculino</label>

                    <input type="radio" name="notinform" value="notinform" id="notinform">
                    <label for="notinform">Prefiro não informar</label>
                    <br>

                    <label for="maritalstatus">Estado Civil</label>
                    <select name="maritalstatus" id="maritalstatus">
                        <option value="notinformed">Selecione...</option>
                        <option value="casado">Casado</option>
                        <option value="solteiro">Solteiro</option>
                        <option value="divorciado">Divorciado</option>
                        <option value="viuvo">Viúvo</option>
                    </select>

                    <label for="userstate">Estado</label>
                        <select name="userstate" id="userstate" required>
                            <option value="">Selecione...</option>
                            <option value="acre">Acre</option>
                            <option value="alagoas">Alagoas</option>
                            <option value="amapá">Amapá</option>
                            <option value="amazonas">Amazonas</option>
                            <option value="bahia">Bahia</option>
                            <option value="ceará">Ceará</option>
                            <option value="distritoFederal">Distrito Federal</option>
                            <option value="espiritoSanto">Espirito Santo</option>
                            <option value="goias">Goiás</option>
                            <option value="maranhao">Maranhão</option>
                            <option value="matoGrossoDoSul">Mato Grosso do Sul</option>
                            <option value="matoGrosso">Mato Grosso</option>
                            <option value="minasGerais">Minas Gerais</option>
                            <option value="para">Pará</option>
                            <option value="paraiba">Paraíba</option>
                            <option value="parana">Paraná</option>
                            <option value="pernambuco">Pernambuco</option>
                            <option value="piaui">Piauí</option>
                            <option value="rioDeJaneiro">Rio de Janeiro</option>
                            <option value="rioGrandeDoNorte">Rio Grande do Norte</option>
                            <option value="rioGrandeDoSul">Rio Grande do Sul</option>
                            <option value="rondonia">Rondônia</option>
                            <option value="roraima">Roraima</option>
                            <option value="santaCatarina">Santa Catarina</option>
                            <option value="saoPaulo">São Paulo</option>
                            <option value="sergipe">Sergipe</option>
                            <option value="tocantins">Tocantins</option>
                        </select>
<!-- clicar duas vezes e ir selecionado como alt, depois dar crlt shift p para abrir o comando e escrever camelCase, que serve deixar as palavras em minúsculas, sem espaço, sem acento -->
<!--git add . - git commit -m "" e git push-->
<!--git branch feat/(NOME DA BRANCH) para criar uma nova branch-->
<!--git checkout feat/(NOME DA BRANCH) para mudar para a nova branch-->
<!-- git status -->
<!--git checkout main para voltar para a branch principal e git pull para trazer as atualizações na branch para a principal-->
                        <label for="usercity">Cidade</label>
                        <input type="text" name="usercity" id="usercity" placeholder="Digite sua cidade">
            </fieldset>

            <fieldset>
                <legend>Hábitos</legend>
                    <p>Redes Sociais</p>

                <input type="checkbox" name="insta" value="instagram" id="insta">
                <label for="insta">Instagram</label>
                <br>
                <input type="checkbox" name="face" value="facebook" id="face">
                <label for="face">Facebook</label>
                <br>
                <input type="checkbox" name="link" value="linkedin" id="link">
                <label for="link">Linkedin</label>
                <br>
                <label for="musicstyle">Estilo Musical</label>
                <input type="text" id="musicstyle" name="usermusicStyle">
                <datalist id="styletype">
                        <option value="Rock">Rock</option>
                        <option value="Pop">Pop</option>
                        <option value="Samba">Samba</option>
                        <option value="Sertaneijo">Sertaneijo</option>
                </datalist>
                <br>
                <label for="favoriteColor">Cor Favorita</label>
                <input type="color" name="userfavoritecolor" id="favoriteColor">
            </fieldset>
            <fieldset>
                <legend>Opinião</legend>
                <p>O que você acha da qualidade do nosso serviço?</p>
                <br>
                <input type="radio" id="noteexcellent" name="ótimo" value="ótimo">
                <label for="noteexcellent">Ótimo</label>
                <br>
                <input type="radio" id="notegreat" name="great" value="boa">
                <label for="notegreat">Boa</label>
                <br>
                <input type="radio" id="noteRegular" name="regular" value="regular">
                <label for="noteRegular">Regular</label>
                <br>
                <input type="radio"  id="notebad" name="ruim" value="ruim">
                <label for="notebad">Ruim</label>
                <br>
                <label for="comment">Escreva a sua opinião</label>
                <textarea name="userComment" id="comment">Digite aqui...</textarea>
            </fieldset>

            <button type="submit">Enviar</button>
        </form>
    </section>
</body>
</html>
